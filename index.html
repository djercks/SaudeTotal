<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saúde & Bem-estar - Rastreador de Saúde</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-title">
                <div class="icon-circle">📊</div>
                <h1>Saúde & Bem-estar</h1>
            </div>
            <p class="header-subtitle">Rastreie sua evolução - Foco em Vitalidade</p>
        </div>
    </header>

    <!-- Main -->
    <main class="container">
        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
            <button class="tab-btn" data-tab="novo">➕ Novo Registro</button>
            <button class="tab-btn" data-tab="graficos">📈 Gráficos</button>
            <button class="tab-btn" data-tab="historico">📋 Histórico</button>
        </nav>

        <!-- Dashboard Tab -->
        <div class="tab-content active" id="dashboard">
            <div id="dashboardContent"></div>
        </div>

        <!-- Novo Registro Tab -->
        <div class="tab-content" id="novo">
            <div class="form-container">
                <h2>Novo Check-up</h2>
                <form id="healthForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="date">Data</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label for="weight">Peso (kg)</label>
                            <input type="number" id="weight" placeholder="70" step="0.1">
                        </div>
                        <div class="form-group">
                            <label for="height">Altura (cm)</label>
                            <input type="number" id="height" placeholder="170">
                        </div>
                        <div class="form-group">
                            <label for="systolic">Pressão Sistólica (mmHg)</label>
                            <input type="number" id="systolic" placeholder="120">
                        </div>
                        <div class="form-group">
                            <label for="diastolic">Pressão Diastólica (mmHg)</label>
                            <input type="number" id="diastolic" placeholder="80">
                        </div>
                        <div class="form-group">
                            <label for="heartRate">Freq. Cardíaca (bpm)</label>
                            <input type="number" id="heartRate" placeholder="72">
                        </div>
                        <div class="form-group">
                            <label for="cholesterol">Colesterol (mg/dL)</label>
                            <input type="number" id="cholesterol" placeholder="180">
                        </div>
                        <div class="form-group">
                            <label for="glucose">Glicemia (mg/dL)</label>
                            <input type="number" id="glucose" placeholder="90">
                        </div>
                    </div>

                    <!-- Seção Exame de Sangue Completo -->
                    <div class="form-section">
                        <h3>Exame de Sangue Completo</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="hemoglobin">Hemoglobina (g/dL)</label>
                                <input type="number" id="hemoglobin" placeholder="13.5" step="0.1">
                            </div>
                            <div class="form-group">
                                <label for="hematocrit">Hematócrito (%)</label>
                                <input type="number" id="hematocrit" placeholder="41" step="0.1">
                            </div>
                            <div class="form-group">
                                <label for="rbc">Glóbulos Vermelhos (milhões/µL)</label>
                                <input type="number" id="rbc" placeholder="4.5" step="0.1">
                            </div>
                            <div class="form-group">
                                <label for="wbc">Glóbulos Brancos (mil/µL)</label>
                                <input type="number" id="wbc" placeholder="7.0" step="0.1">
                            </div>
                            <div class="form-group">
                                <label for="platelets">Plaquetas (mil/µL)</label>
                                <input type="number" id="platelets" placeholder="250" step="1">
                            </div>
                            <div class="form-group">
                                <label for="hdl">HDL - Colesterol Bom (mg/dL)</label>
                                <input type="number" id="hdl" placeholder="50" step="1">
                            </div>
                            <div class="form-group">
                                <label for="ldl">LDL - Colesterol Ruim (mg/dL)</label>
                                <input type="number" id="ldl" placeholder="100" step="1">
                            </div>
                            <div class="form-group">
                                <label for="triglycerides">Triglicerídeos (mg/dL)</label>
                                <input type="number" id="triglycerides" placeholder="150" step="1">
                            </div>
                            <div class="form-group">
                                <label for="creatinine">Creatinina (mg/dL)</label>
                                <input type="number" id="creatinine" placeholder="0.9" step="0.1">
                            </div>
                            <div class="form-group">
                                <label for="urea">Ureia (mg/dL)</label>
                                <input type="number" id="urea" placeholder="35" step="1">
                            </div>
                            <div class="form-group">
                                <label for="ast">TGO/AST (U/L)</label>
                                <input type="number" id="ast" placeholder="30" step="1">
                            </div>
                            <div class="form-group">
                                <label for="alt">TGP/ALT (U/L)</label>
                                <input type="number" id="alt" placeholder="30" step="1">
                            </div>
                            <div class="form-group">
                                <label for="bilirubin">Bilirrubina Total (mg/dL)</label>
                                <input type="number" id="bilirubin" placeholder="0.8" step="0.1">
                            </div>
                            <div class="form-group">
                                <label for="albumin">Albumina (g/dL)</label>
                                <input type="number" id="albumin" placeholder="3.5" step="0.1">
                            </div>
                            <div class="form-group">
                                <label for="totalProtein">Proteína Total (g/dL)</label>
                                <input type="number" id="totalProtein" placeholder="7.0" step="0.1">
                            </div>
                        </div>
                    </div>

                    <!-- Nova Seção: Energia & Vitalidade -->
                    <div class="form-section">
                        <h3>🔋 Energia & Vitalidade</h3>
                        <p class="section-help">Campos chave para disposição e energia diária</p>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="vitaminD">Vitamina D (ng/mL)</label>
                                <input type="number" id="vitaminD" placeholder="40" step="0.1">
                            </div>
                            <div class="form-group">
                                <label for="ferritin">Ferritina (ng/mL)</label>
                                <input type="number" id="ferritin" placeholder="100" step="1">
                            </div>
                            <div class="form-group">
                                <label for="b12">Vitamina B12 (pg/mL)</label>
                                <input type="number" id="b12" placeholder="400" step="1">
                            </div>
                            <div class="form-group">
                                <label for="tsh">TSH (µUI/mL)</label>
                                <input type="number" id="tsh" placeholder="2.0" step="0.01">
                            </div>
                            <div class="form-group">
                                <label for="testosterone">Testosterona (ng/dL) <span style="font-size:0.75rem;color:#666;">(opcional)</span></label>
                                <input type="number" id="testosterone" placeholder="500" step="1">
                            </div>
                            <div class="form-group">
                                <label for="cortisol">Cortisol Manhã (µg/dL)</label>
                                <input type="number" id="cortisol" placeholder="15" step="0.1">
                            </div>
                            <div class="form-group">
                                <label for="energyMorning">Energia ao Acordar (1-10)</label>
                                <input type="number" id="energyMorning" placeholder="7" min="1" max="10">
                            </div>
                            <div class="form-group">
                                <label for="energyMidday">Energia Meio-dia (1-10)</label>
                                <input type="number" id="energyMidday" placeholder="6" min="1" max="10">
                            </div>
                            <div class="form-group">
                                <label for="energyEvening">Energia Fim do Dia (1-10)</label>
                                <input type="number" id="energyEvening" placeholder="5" min="1" max="10">
                            </div>
                        </div>
                    </div>

                    <div class="form-group full">
                        <label for="notes">Observações</label>
                        <textarea id="notes" placeholder="Qualquer observação adicional... (ex: disposição, sono, humor, vitalidade)" rows="3"></textarea>
                    </div>
                    <div class="form-buttons">
                        <button type="submit" class="btn btn-primary">💾 Salvar Registro</button>
                        <button type="button" class="btn btn-secondary" onclick="switchTab('dashboard')">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Gráficos Tab -->
        <div class="tab-content" id="graficos">
            <div id="graficosContent"></div>
        </div>

        <!-- Histórico Tab -->
        <div class="tab-content" id="historico">
            <div id="historicoContent"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
