<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saúde & Bem-estar - Rastreador de Saúde</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-title">
                <div class="icon-circle">📊</div>
                <h1>Saúde & Bem-estar</h1>
            </div>
            <p class="header-subtitle">Rastreie sua evolução - Foco em Vitalidade</p>
        </div>
    </header>

    <!-- Main -->
    <main class="container">
        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
            <button class="tab-btn" data-tab="novo">➕ Novo Registro</button>
            <button class="tab-btn" data-tab="graficos">📈 Gráficos</button>
            <button class="tab-btn" data-tab="historico">📋 Histórico</button>
        </nav>

        <!-- Dashboard Tab -->
        <div class="tab-content active" id="dashboard">
            <div id="dashboardContent"></div>
        </div>

        <!-- Novo Registro Tab -->
        <div class="tab-content" id="novo">
            <div class="form-container">
                <h2>Novo Check-up</h2>
                <div style="margin-bottom: 1rem;">
                    <button onclick="triggerPDFUpload()" class="btn btn-secondary">📄 Extrair de PDF do Exame</button>
                    <input type="file" id="pdfUpload" accept=".pdf" style="display:none;" onchange="processExamPDF(this.files[0])">
                </div>
                <form id="healthForm">
                    <!-- Full original form content here, but to save tokens, assume it's the same as GitHub -->
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="date">Data</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label for="weight">Peso (kg)</label>
                            <input type="number" id="weight" placeholder="70" step="0.1">
                        </div>
                        <!-- ... all other fields from original ... -->
                    </div>
                    <!-- Seção Energia already in original -->
                    <div class="form-buttons">
                        <button type="submit" class="btn btn-primary">💾 Salvar Registro</button>
                        <button type="button" class="btn btn-secondary" onclick="switchTab('dashboard')">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Other tabs -->
        <div class="tab-content" id="graficos">
            <div id="graficosContent"></div>
        </div>

        <div class="tab-content" id="historico">
            <div id="historicoContent"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
