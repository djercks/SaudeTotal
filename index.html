<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saúde & Bem-estar - Rastreador de Saúde</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-title">
                <div class="icon-circle">📊</div>
                <h1>Saúde & Bem-estar</h1>
            </div>
            <p class="header-subtitle">Rastreie sua evolução - Foco em Vitalidade</p>
        </div>
    </header>

    <!-- Main -->
    <main class="container">
        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
            <button class="tab-btn" data-tab="novo">➕ Novo Registro</button>
            <button class="tab-btn" data-tab="graficos">📈 Gráficos</button>
            <button class="tab-btn" data-tab="historico">📋 Histórico</button>
        </nav>

        <!-- Dashboard Tab -->
        <div class="tab-content active" id="dashboard">
            <div id="dashboardContent"></div>
        </div>

        <!-- Novo Registro Tab -->
        <div class="tab-content" id="novo">
            <div class="form-container">
                <h2>Novo Check-up</h2>
                <div style="margin-bottom: 1rem;">
                    <button onclick="uploadExamPDF()" class="btn btn-secondary">📄 Extrair de PDF (Exame)</button>
                    <input type="file" id="pdfUpload" accept=".pdf" style="display:none;" onchange="processPDF(this)">
                </div>
                <form id="healthForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="date">Data</label>
                            <input type="date" id="date" required>
                        </div>
                    </div>

                    <!-- Seção Energia & Vitalidade -->
                    <div class="form-section">
                        <h3>🔋 Energia &amp; Vitalidade</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="vitaminaD">Vitamina D (ng/mL)</label>
                                <input type="number" step="0.1" id="vitaminaD" placeholder="Ex: 45.2">
                            </div>
                            <div class="form-group">
                                <label for="ferritina">Ferritina (ng/mL)</label>
                                <input type="number" step="0.1" id="ferritina" placeholder="Ex: 120">
                            </div>
                            <div class="form-group">
                                <label for="b12">Vitamina B12 (pg/mL)</label>
                                <input type="number" step="0.1" id="b12" placeholder="Ex: 450">
                            </div>
                            <div class="form-group">
                                <label for="tsh">TSH (µUI/mL)</label>
                                <input type="number" step="0.01" id="tsh" placeholder="Ex: 2.5">
                            </div>
                            <div class="form-group">
                                <label for="testosterona">Testosterona Livre (ng/dL)</label>
                                <input type="number" step="0.1" id="testosterona" placeholder="Ex: 12.5">
                            </div>
                            <div class="form-group">
                                <label for="cortisol">Cortisol Manhã / Basal (µg/dL)</label>
                                <input type="number" step="0.1" id="cortisol" placeholder="Ex: 18.5">
                            </div>

                            <div class="form-group">
                                <label for="energiaAcordar">Energia ao Acordar (1-10)</label>
                                <input type="number" min="1" max="10" id="energiaAcordar" value="5">
                            </div>
                            <div class="form-group">
                                <label for="energiaMeioDia">Energia Meio-dia (1-10)</label>
                                <input type="number" min="1" max="10" id="energiaMeioDia" value="5">
                            </div>
                            <div class="form-group">
                                <label for="energiaFimDia">Energia Fim do Dia (1-10)</label>
                                <input type="number" min="1" max="10" id="energiaFimDia" value="5">
                            </div>
                        </div>
                    </div>

                    <!-- Observações -->
                    <div class="form-group">
                        <label for="observacoes">Observações (como se sentiu, sintomas, etc.)</label>
                        <textarea id="observacoes" rows="3" placeholder="Ex: Acordei com dor de cabeça, mas melhorei no fim do dia..."></textarea>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn btn-primary">💾 Salvar Registro</button>
                        <button type="button" class="btn btn-secondary" onclick="switchTab('dashboard')">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Other tabs -->
        <div class="tab-content" id="graficos">
            <div id="graficosContent"></div>
        </div>

        <div class="tab-content" id="historico">
            <div id="historicoContent"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
